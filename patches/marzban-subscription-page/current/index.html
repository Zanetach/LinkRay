<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkRay 订阅</title>
  <style>
    :root { color-scheme: light; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f05aa5, #f6d84b 36%, #1fcfb7 70%, #4257e8);
      color: #0f172a;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }
    .panel {
      width: min(920px, calc(100vw - 40px));
      background: rgba(255, 255, 255, .94);
      border: 1px solid rgba(226, 232, 240, .9);
      border-radius: 12px;
      box-shadow: 0 20px 65px rgba(15, 23, 42, .18);
      padding: 24px;
    }
    h1 { margin: 0 0 18px; font-size: 18px; }
    .list { display: grid; gap: 12px; }
    .row {
      display: grid;
      grid-template-columns: 150px minmax(0, 1fr) auto auto;
      gap: 8px;
      align-items: center;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 10px;
      background: #fbfdff;
    }
    .label { font-size: 14px; font-weight: 800; }
    input {
      width: 100%;
      min-width: 0;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 10px 11px;
      font-size: 13px;
      color: #0f172a;
      background: #fff;
    }
    button {
      border: 0;
      border-radius: 8px;
      padding: 10px 13px;
      font-size: 13px;
      font-weight: 800;
      color: #fff;
      background: #7c83eb;
      cursor: pointer;
      white-space: nowrap;
    }
    button.secondary { background: #42587a; }
    .hint {
      font-size: 13px;
      line-height: 1.7;
      color: #64748b;
      margin: 14px 0 0;
    }
    .qr {
      margin-top: 14px;
      display: none;
      align-items: center;
      justify-content: center;
      border: 1px dashed #cbd5e1;
      border-radius: 10px;
      padding: 14px;
      background: #fff;
    }
    @media (max-width: 760px) {
      .row { grid-template-columns: 1fr; }
      button { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="panel">
    <h1>客户端订阅链接</h1>
    <div class="list" id="links"></div>
    <p class="hint">优先使用对应客户端专用链接；自动识别订阅会按客户端返回 Egern、Clash/Mihomo、sing-box 或通用 Base64；识别失败时使用上方专用链接；v2rayN/v2rayNG 可用 v2ray-json。</p>
    <div class="qr" id="qr"></div>
  </main>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script>
    const base = location.href.replace(/\/(clash-meta|egern|sing-box|v2ray-json|clash)\/?$/, '').replace(/\/$/, '');
    const rows = [
      ['自动识别订阅', base],
      ['Clash/Mihomo', base + '/clash-meta'],
      ['Egern', base + '/egern'],
      ['sing-box', base + '/sing-box'],
      ['v2ray-json', base + '/v2ray-json'],
    ];
    const root = document.getElementById('links');
    const qr = document.getElementById('qr');
    rows.forEach(([name, url]) => {
      const row = document.createElement('div');
      row.className = 'row';
      row.innerHTML = `<div class="label">${name}</div><input readonly value="${url.replace(/&/g, '&amp;').replace(/"/g, '&quot;')}"><button type="button" class="copy">复制</button><button type="button" class="secondary qrcode">二维码</button>`;
      root.appendChild(row);
      row.querySelector('.copy').onclick = async () => {
        const input = row.querySelector('input');
        input.select();
        try { await navigator.clipboard.writeText(input.value); } catch (_error) { document.execCommand('copy'); }
      };
      row.querySelector('.qrcode').onclick = () => {
        qr.style.display = 'flex';
        qr.innerHTML = '';
        new QRCode(qr, { text: url, width: 256, height: 256, correctLevel: QRCode.CorrectLevel.L });
      };
    });
  </script>
</body>
</html>
