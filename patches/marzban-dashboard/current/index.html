<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="viewport" content="width=device-width, user-scalable=no" />

    <link

    />
    <link
      rel="icon"
      type="image/png"

    />
    <link

    />
    <link rel="manifest" href="/statics/favicon/site.webmanifest" />
    <link
      rel="mask-icon"

      color="#5bbad5"
    />
    <link rel="shortcut icon" href="/statics/favicon/favicon.ico" />

    <meta name="application-name" content="LinkRay" />
    <meta name="msapplication-TileColor" content="#2b5797" />
    <meta name="msapplication-config" content="/statics/favicon/browserconfig.xml" />
    <meta name="theme-color" content="#3B81F6" />

    <link rel="modulepreload" crossorigin href="/statics/vendor.9eb61f8b.js">
    <link rel="stylesheet" href="/statics/index.9b97897c.css">
  </head>
  <body>
    <div id="root"></div>
    <script>
      (() => {
        try {
          if (window.linkrayProtocolCardDetails) return;
          window.linkrayProtocolCardDetails = true;

          const sectionTitle = "LinkRay 完整入站";
          const protocols = [
            {
              name: "Vmess",
              detail: "TCP TLS / WS TLS / HTTPUpgrade TLS",
              inbounds: ["VMess TCP TLS", "VMess WS TLS", "VMess HTTPUpgrade TLS"],
            },
            {
              name: "Vless",
              detail: "TCP TLS / Reality / gRPC Reality / WS TLS / gRPC TLS / XHTTP Reality",
              inbounds: [
                "VLESS TCP TLS",
                "VLESS TCP REALITY",
                "VLESS GRPC REALITY",
                "VLESS WS TLS",
                "VLESS GRPC TLS",
                "VLESS XHTTP REALITY",
              ],
            },
            {
              name: "Trojan",
              detail: "TCP TLS / gRPC TLS",
              inbounds: ["Trojan TCP TLS", "Trojan GRPC TLS"],
            },
            {
              name: "Shadowsocks",
              detail: "TCP UDP",
              inbounds: ["Shadowsocks TCP UDP"],
            },
          ];
          const advancedProtocols = [
            { key: "hysteria2", name: "Hysteria2", detail: "sing-box UDP，高速传输" },
            { key: "tuic", name: "TUIC", detail: "sing-box UDP，低延迟" },
            { key: "anytls", name: "AnyTLS", detail: "sing-box TLS，通用兼容" },
            { key: "snell", name: "Snell", detail: "Shadowrocket / Surge 优先" },
          ];
          const linkrayRepoUrl = "https://github.com/Zanetach/LinkRay";

          const styleText = `
            .linkray-protocol-card-detail {
              color: #64748b;
              font-size: 12px;
              font-weight: 600;
              line-height: 1.45;
              margin-top: 6px;
              max-width: 100%;
              overflow-wrap: anywhere;
            }
            .linkray-protocol-card-detail strong {
              color: #334155;
              font-weight: 700;
            }
            .linkray-advanced-protocols {
              display: block;
              margin-top: 8px;
            }
            .linkray-advanced-protocols-title {
              display: none;
            }
            .linkray-advanced-protocols-grid {
              display: flex;
              flex-direction: column;
              gap: 8px;
            }
            .linkray-advanced-protocol-card {
              background: #f8fbff;
              border: 1px solid #cbd5e1;
              border-radius: 8px;
              cursor: pointer;
              padding: 10px 12px;
              user-select: none;
            }
            .linkray-advanced-protocol-card[data-enabled="true"] {
              border-color: #4d7de7;
              background: #eef4ff;
            }
            .linkray-advanced-protocol-name {
              color: #111827;
              font-size: 13px;
              font-weight: 800;
            }
            .linkray-advanced-protocol-detail {
              color: #64748b;
              font-size: 11px;
              font-weight: 600;
              margin-top: 2px;
            }
            .linkray-hidden-dashboard-donate {
              display: none !important;
            }
            .linkray-hidden-dashboard-footer {
              display: none !important;
            }
          `;

          function ensureStyle() {
            if (document.getElementById("linkray-protocol-card-detail-style")) return;
            const style = document.createElement("style");
            style.id = "linkray-protocol-card-detail-style";
            style.textContent = styleText;
            document.head.appendChild(style);
          }

          function textOf(node) {
            return (node && (node.innerText || node.textContent) || "").replace(/\s+/g, " ").trim();
          }

          function ownTextOf(node) {
            if (!node) return "";
            return Array.from(node.childNodes)
              .filter((child) => child.nodeType === Node.TEXT_NODE)
              .map((child) => child.textContent || "")
              .join("")
              .replace(/\s+/g, " ")
              .trim();
          }

          function titleElements(name) {
            return Array.from(document.querySelectorAll("label,div,span,p,h1,h2,h3,h4,h5,h6"))
              .filter((node) => ownTextOf(node) === name || textOf(node) === name);
          }

          function detailTarget(titleNode) {
            let best = titleNode.parentElement || titleNode;
            let current = titleNode.parentElement;
            for (let depth = 0; current && depth < 5; depth += 1, current = current.parentElement) {
              const text = textOf(current);
              const box = current.getBoundingClientRect();
              if (text.includes(textOf(titleNode)) && text.length <= 220 && box.width >= 120 && box.height <= 160) {
                best = current;
              }
            }
            return best;
          }

          function createDialog() {
            const roleDialogs = Array.from(document.querySelectorAll("[role='dialog']"))
              .filter((node) => {
                const text = textOf(node);
                const box = node.getBoundingClientRect();
                return text.includes("创建新用户") && text.includes("协议") && box.width >= 300 && box.height >= 260;
              })
              .sort((a, b) => textOf(a).length - textOf(b).length);
            if (roleDialogs[0]) return roleDialogs[0];
            const candidates = Array.from(document.querySelectorAll("section,div"))
              .filter((node) => {
                const text = textOf(node);
                const box = node.getBoundingClientRect();
                return text.includes("创建新用户") && text.includes("协议") && box.width >= 300 && box.height >= 260;
              })
              .sort((a, b) => textOf(a).length - textOf(b).length);
            return candidates[0] || null;
          }

          function protocolSection(dialog) {
            const title = Array.from(dialog.querySelectorAll("label,div,span,p,h1,h2,h3,h4,h5,h6"))
              .find((node) => ownTextOf(node) === "协议" || textOf(node) === "协议");
            let current = title ? title.parentElement : null;
            while (current && current !== dialog) {
              const text = textOf(current);
              const box = current.getBoundingClientRect();
              if (
                text.includes("协议") &&
                text.includes("Vmess") &&
                text.includes("Vless") &&
                box.width >= 120 &&
                box.height >= 180
              ) {
                return current;
              }
              current = current.parentElement;
            }
            return dialog.querySelector(".chakra-modal__body") || dialog;
          }

          function selectedAdvancedProtocols() {
            const cards = Array.from(document.querySelectorAll(".linkray-advanced-protocol-card"));
            if (!cards.length) return advancedProtocols.map((protocol) => protocol.key);
            return cards
              .filter((card) => card.getAttribute("data-enabled") === "true")
              .map((card) => card.getAttribute("data-protocol"))
              .filter(Boolean);
          }

          function injectAdvancedProtocolSelector() {
            const dialog = createDialog();
            if (!dialog || document.querySelector(".linkray-advanced-protocols")) return;
            const panel = document.createElement("div");
            panel.className = "linkray-advanced-protocols";
            panel.innerHTML = `
              <div class="linkray-advanced-protocols-grid">
                ${advancedProtocols
                  .map(
                    (protocol) => `
                      <div class="linkray-advanced-protocol-card" data-protocol="${protocol.key}" data-enabled="true" role="button" tabindex="0">
                        <div class="linkray-advanced-protocol-name">${protocol.name}</div>
                        <div class="linkray-advanced-protocol-detail">${protocol.detail}</div>
                      </div>
                    `,
                  )
                  .join("")}
              </div>
            `;
            panel.addEventListener("click", (event) => {
              const card = event.target.closest(".linkray-advanced-protocol-card");
              if (!card) return;
              card.setAttribute("data-enabled", card.getAttribute("data-enabled") === "true" ? "false" : "true");
            });
            protocolSection(dialog).appendChild(panel);
          }

          function hideDonateEntry() {
            const donateLabel = /^(捐赠|Donate)$/i;
            Array.from(document.querySelectorAll("a,button,[role='button']"))
              .filter((node) => donateLabel.test(textOf(node)))
              .forEach((node) => {
                node.classList.add("linkray-hidden-dashboard-donate");
                node.setAttribute("aria-hidden", "true");
                node.setAttribute("tabindex", "-1");
              });
          }

          function hideMarzbanFooter() {
            const footerText = /(Marzban|Gozargah|Made with)/i;
            const footerLinks = Array.from(document.querySelectorAll("a"))
              .filter((node) => footerText.test(textOf(node)) || footerText.test(node.getAttribute("href") || ""));
            footerLinks.forEach((node) => {
              let target = null;
              for (let current = node; current && current !== document.body; current = current.parentElement) {
                const text = textOf(current);
                const box = current.getBoundingClientRect();
                if (
                  footerText.test(text) &&
                  box.width <= 700 &&
                  box.height <= 120 &&
                  text.length <= 180
                ) {
                  target = current;
                }
              }
              if (!target) return;
              target.classList.add("linkray-hidden-dashboard-footer");
              target.setAttribute("aria-hidden", "true");
            });
          }

          function retargetStarEntry() {
            const legacyRepo = /github\.com\/Gozargah\/Marzban|github\.com\/Gozargah/i;
            const starText = /(^|\s)Star(\s|$)|Star Marzban/i;
            Array.from(document.querySelectorAll("a[href],button,[role='button']"))
              .filter((node) => {
                const href = node.getAttribute("href") || "";
                const label = node.getAttribute("aria-label") || "";
                const candidateText = `${textOf(node)} ${label}`;
                return starText.test(candidateText) || (legacyRepo.test(href) && starText.test(candidateText));
              })
              .forEach((node) => {
                if (node.tagName === "A") {
                  node.setAttribute("href", linkrayRepoUrl);
                  node.setAttribute("target", "_blank");
                  node.setAttribute("rel", "noopener noreferrer");
                }
                node.setAttribute("aria-label", "Star LinkRay on GitHub");
                node.setAttribute("title", "Star LinkRay on GitHub");
              });

            Array.from(document.querySelectorAll("iframe"))
              .filter((node) => /github|ghbtn|button/i.test(node.getAttribute("src") || ""))
              .forEach((node) => {
                try {
                  const src = new URL(node.getAttribute("src"), window.location.origin);
                  src.searchParams.set("user", "Zanetach");
                  src.searchParams.set("repo", "LinkRay");
                  node.setAttribute("src", src.toString());
                  node.setAttribute("title", "Star LinkRay on GitHub");
                } catch (_) {
                  node.setAttribute("title", "Star LinkRay on GitHub");
                }
              });
          }

          function parseCreateUserBody(body) {
            if (!body) return null;
            if (typeof body === "string") {
              try {
                return JSON.parse(body);
              } catch (_) {
                return null;
              }
            }
            if (body instanceof URLSearchParams) return Object.fromEntries(body.entries());
            return null;
          }

          function requestPath(input) {
            try {
              const raw = typeof input === "string" ? input : input && input.url;
              if (!raw) return "";
              return new URL(raw, window.location.origin).pathname;
            } catch (_) {
              return "";
            }
          }

          function syncAdvancedProtocols(username, protocols) {
            if (!username) return;
            const token = localStorage.getItem("token") || "";
            window.fetch("/api/linkray/user-protocols", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                ...(token ? { Authorization: `Bearer ${token}` } : {}),
              },
              body: JSON.stringify({ username, protocols }),
            }).catch((error) => console.warn("LinkRay advanced protocol sync failed", error));
          }

          function patchCreateUserFetch() {
            if (window.linkrayCreateUserFetchPatched || !window.fetch) return;
            window.linkrayCreateUserFetchPatched = true;
            const originalFetch = window.fetch.bind(window);
            window.fetch = async (input, init = {}) => {
              const method = String((init && init.method) || (input && input.method) || "GET").toUpperCase();
              const path = requestPath(input);
              const body = parseCreateUserBody(init && init.body);
              const protocols = method === "POST" && path.endsWith("/api/user") ? selectedAdvancedProtocols() : null;
              const response = await originalFetch(input, init);
              if (protocols && response.ok && body && body.username) {
                syncAdvancedProtocols(String(body.username), protocols);
              }
              return response;
            };
          }

          function applyDetails() {
            try {
              ensureStyle();
              injectAdvancedProtocolSelector();
              hideDonateEntry();
              hideMarzbanFooter();
              retargetStarEntry();
              protocols.forEach((protocol) => {
                titleElements(protocol.name).forEach((titleNode) => {
                  const target = detailTarget(titleNode);
                  if (!target || target.querySelector(".linkray-protocol-card-detail")) return;
                  const detail = document.createElement("div");
                  detail.className = "linkray-protocol-card-detail";
                  detail.setAttribute("aria-label", `${sectionTitle}: ${protocol.inbounds.join(", ")}`);
                  detail.title = `${sectionTitle}: ${protocol.inbounds.join(", ")}`;
                  detail.innerHTML = `<strong>入站：</strong>${protocol.detail}`;
                  target.appendChild(detail);
                });
              });
            } catch (error) {
              console.warn("LinkRay protocol details failed", error);
            }
          }

          function boot() {
            patchCreateUserFetch();
            applyDetails();
            const observer = new MutationObserver(applyDetails);
            observer.observe(document.body, { childList: true, subtree: true });
            window.setInterval(applyDetails, 1500);
          }

          if (document.readyState === "loading") {
            document.addEventListener("DOMContentLoaded", boot, { once: true });
          } else {
            boot();
          }
        } catch (error) {
          console.warn("LinkRay protocol details bootstrap failed", error);
        }
      })();
    </script>
  </body>
</html>
