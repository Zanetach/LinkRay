# LinkRay Clash/Mihomo subscription template for Marzban.
# Applies to /sub/<token>/clash-meta and future users.
mode: rule
mixed-port: 7890
allow-lan: true
bind-address: "*"
log-level: info
ipv6: false
unified-delay: true
tcp-concurrent: true

tun:
  route-exclude-address:
{% for address in proxy_server_addresses | default([]) %}
    - "{{ address }}"
{% endfor %}

profile:
  store-selected: true
  store-fake-ip: false

sniffer:
  enable: true
  override-destination: false
  sniff:
    TLS:
      ports: [443]
    HTTP:
      ports: [80]

dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "*.localhost"
    - "localhost.ptlogin2.qq.com"
    - "dns.google"
    - "time.*.com"
    - "ntp.*.com"
{% for domain in proxy_server_domains | default([]) %}
    - "{{ domain }}"
{% endfor %}
  use-hosts: true
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
    - tls://1.1.1.1
  proxy-server-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver-policy:
{% for domain in proxy_server_domains | default([]) %}
    "{{ domain }}": 223.5.5.5
{% endfor %}

{{ conf | except("proxy-groups", "port", "mode", "rules") | yaml }}

proxy-groups:
  - name: 手动切换
    type: select
    proxies:
{{ proxy_remarks | yaml | indent(6, true) }}

  - name: 自动选择
    type: url-test
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    lazy: true
    proxies:
{{ proxy_remarks | yaml | indent(6, true) }}

