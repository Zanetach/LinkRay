<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkRay 订阅</title>
  <style>
    :root { color-scheme: light; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f05aa5, #f6d84b 36%, #1fcfb7 70%, #4257e8);
      color: #0f172a;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }
    .panel {
      width: min(1040px, calc(100vw - 40px));
      background: rgba(255, 255, 255, .94);
      border: 1px solid rgba(226, 232, 240, .9);
      border-radius: 12px;
      box-shadow: 0 20px 65px rgba(15, 23, 42, .18);
      padding: 24px;
    }
    h1 { margin: 0 0 18px; font-size: 18px; }
    .sections { display: grid; gap: 14px; }
    .section {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      background: #fbfdff;
      padding: 12px;
    }
    .section-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }
    .section-title { color: #0f172a; font-size: 15px; font-weight: 900; }
    .section-note {
      color: #64748b;
      font-size: 12px;
      font-weight: 600;
      line-height: 1.45;
      margin-top: 3px;
    }
    .downloads {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 7px;
      flex-wrap: wrap;
      min-width: 220px;
    }
    .download-label { color: #64748b; font-size: 12px; font-weight: 800; }
    .download {
      display: inline-flex;
      align-items: center;
      border: 1px solid #cbd5e1;
      border-radius: 999px;
      background: #fff;
      color: #334155;
      text-decoration: none;
      font-size: 12px;
      font-weight: 800;
      padding: 6px 9px;
    }
    .list { display: grid; gap: 9px; }
    .row {
      display: grid;
      grid-template-columns: 190px minmax(0, 1fr) auto auto;
      gap: 8px;
      align-items: center;
      border: 1px solid #edf1f7;
      border-radius: 10px;
      padding: 10px;
      background: #fff;
    }
    .label { font-size: 14px; font-weight: 800; }
    .path {
      display: block;
      margin-top: 4px;
      font-size: 11px;
      font-weight: 700;
      color: #64748b;
    }
    input {
      width: 100%;
      min-width: 0;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 10px 11px;
      font-size: 13px;
      color: #0f172a;
      background: #fff;
    }
    button {
      border: 0;
      border-radius: 8px;
      padding: 10px 13px;
      font-size: 13px;
      font-weight: 800;
      color: #fff;
      background: #7c83eb;
      cursor: pointer;
      white-space: nowrap;
    }
    button.secondary { background: #42587a; }
    .hint {
      font-size: 13px;
      line-height: 1.7;
      color: #64748b;
      margin: 14px 0 0;
    }
    .qr {
      margin-top: 14px;
      display: none;
      align-items: center;
      justify-content: center;
      border: 1px dashed #cbd5e1;
      border-radius: 10px;
      padding: 14px;
      background: #fff;
    }
    @media (max-width: 760px) {
      .section-head { display: block; }
      .downloads { justify-content: flex-start; margin-top: 8px; }
      .row { grid-template-columns: 1fr; }
      button { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="panel">
    <h1>客户端订阅链接</h1>
    <div class="sections" id="links"></div>
    <p class="hint">优先使用自动识别订阅；全量调试会展示 CA/LA 和高级 Xray 节点，可能包含客户端测速不稳定的节点。</p>
    <div class="qr" id="qr"></div>
  </main>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script>
    const base = location.href.replace(/\/(clash-meta|clash-meta-full|shadowrocket|shadowrocket-conf|egern|sing-box|v2ray-json|clash)\/?$/, '').replace(/\/$/, '');
    const xrayRows = [
      ['自动识别订阅', base],
      ['Clash/Mihomo', base + '/clash-meta'],
      ['Clash/Mihomo 全量调试', base + '/clash-meta-full', '/clash-meta-full'],
      ['Shadowrocket', base + '/shadowrocket', '/shadowrocket'],
      ['Egern', base + '/egern'],
      ['v2ray-json', base + '/v2ray-json'],
    ];
    const singboxRows = [
      ['sing-box', base + '/sing-box', '/sing-box'],
    ];
    const groups = [
      {
        title: 'Xray-core 稳定链路',
        note: 'VLESS / VMess / Trojan / Shadowsocks 等稳定节点；全量调试入口用于查看 CA/LA 完整 Xray 节点。',
        rows: xrayRows,
        downloads: [
          ['FlClash', 'https://github.com/chen08209/FlClash'],
          ['Shadowrocket', 'https://apps.apple.com/app/shadowrocket/id932747118'],
          ['Egern', 'https://apps.apple.com/app/egern/id1616105820'],
          ['v2rayN', 'https://github.com/2dust/v2rayN'],
        ],
      },
      {
        title: 'sing-box 高级链路',
        note: '包含 Hysteria2 / TUIC / AnyTLS；请使用 sing-box 系客户端。',
        rows: singboxRows,
        downloads: [
          ['sing-box 客户端', 'https://sing-box.sagernet.org/clients/'],
        ],
      },
    ];
    const root = document.getElementById('links');
    const qr = document.getElementById('qr');
    function safe(value) {
      return String(value).replace(/&/g, '&amp;').replace(/"/g, '&quot;');
    }
    function appendRow(list, name, url, path) {
      const row = document.createElement('div');
      row.className = 'row';
      row.innerHTML = `<div class="label">${name}${path ? `<span class="path">${path}</span>` : ''}</div><input readonly value="${safe(url)}"><button type="button" class="copy">复制</button><button type="button" class="secondary qrcode">二维码</button>`;
      list.appendChild(row);
      row.querySelector('input').scrollLeft = row.querySelector('input').scrollWidth;
      row.querySelector('.copy').onclick = async () => {
        const input = row.querySelector('input');
        input.select();
        try { await navigator.clipboard.writeText(input.value); } catch (_error) { document.execCommand('copy'); }
      };
      row.querySelector('.qrcode').onclick = () => {
        qr.style.display = 'flex';
        qr.innerHTML = '';
        new QRCode(qr, { text: url, width: 256, height: 256, correctLevel: QRCode.CorrectLevel.L });
      };
    }
    groups.forEach((group) => {
      const section = document.createElement('section');
      section.className = 'section';
      section.innerHTML = `<div class="section-head"><div><div class="section-title">${group.title}</div><div class="section-note">${group.note}</div></div><div class="downloads"><span class="download-label">下载客户端</span>${group.downloads.map(([name, url]) => `<a class="download" href="${safe(url)}" target="_blank" rel="noopener noreferrer">${name}</a>`).join('')}</div></div><div class="list"></div>`;
      root.appendChild(section);
      const list = section.querySelector('.list');
      group.rows.forEach(([name, url, path]) => appendRow(list, name, url, path));
    });
  </script>
</body>
</html>
